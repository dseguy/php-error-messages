id = "cannot-modify-header-information---headers-already-sent"
error = "Cannot modify header information - headers already sent"
phpVersion = "7.0+"
level = "E_WARNING"
exception = ""
code = " <?php
// There is a space before the opening tag

headers('my headers');

// There is a space after the closing tag, which impact including and autoloading files
?> "
description = "This error happens when PHP has already started sending the body of the response to the client. In HTTP protocol, the headers must comme first, and after, the body.

There are several reasons for PHP to start sending the body early. Among the most frequent, there might be a space, or the UTF-8 BOM at the beginning of an included file. They may also be at the end of the code, if there is a closing PHP tag.

There may also be some displays, with ``echo``, or from errors."
alternative[] = "Check the beginning of the script for invisible, or visible characters before the opening PHP tag."
alternative[] = "Check the beginning of the UTF-8 BOM before the opening PHP tag."
alternative[] = "Check the end of the script for invisible characters after the closing PHP tag, if any."
alternative[] = "Check any included files for the first three tips."
alternative[] = "Check for any call to a display functions, such as ``echo``, ``print``, ``print_r``, ``var_dump()``, ``debug_print_backtrace()``."
alternative[] = "Check that ``output_buffering`` is active in the PHP configuration."
