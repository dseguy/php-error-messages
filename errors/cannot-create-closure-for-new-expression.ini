id = "cannot-create-closure-for-new-expression"
error = "Cannot create Closure for new expression"
phpVersion = "8.1+"
level = "E_ERROR"
exception = ""
code = "<?php

class X {
    function __construct() {}
}

$closure = new X(...);

?>"
description = "When using the ``...`` ellpsis operator as an argument, it creates a closure, based on the current function or method. While the syntax can be linted by PHP, it is not possible to use it with a ``new`` operator."
alternative[] = "Make a closure that takes the arguments, and relay them to the ``new`` operator."
alternative[] = "Create a named constructor, and make a closure from this."
