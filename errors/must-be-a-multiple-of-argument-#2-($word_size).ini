id = "must-be-a-multiple-of-argument-#2-($word_size)"
error = "must be a multiple of argument #2 ($word_size)"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php
gmp_import('aa', 3);
?>"
description = "The second option of ``gmp_import()`` configures the number of bytes to take in the string to build the number. Each GMP digit will be read over ``$word_size`` characters. When the string has a length that is not a multiple of the size of each word, GMP will run short of a few bytes, and emits the error."
alternative[] = "Check that the string length is a multiple of the 2nd argument of ``gmp_import()``."
alternative[] = "Use a word length that is a factor of the string length."
alternative[] = "Use a word length of 1, which works all the time, yet may not yield the expected result."
related[] = ""
examples[] = "Argument #1 ($data) must be a multiple of argument #2 ($word_size)"
tags[] = ""
seeAlso[] = ""
features[] = "validation"
previous = ""
next = ""
extension[] = "gmp"
