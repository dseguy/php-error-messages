id = "cannot-use-%s-as-value-for-class-constant-%s::%s-of-type-%s"
error = "Cannot use %s as value for class constant %s::%s of type %s"
phpVersion = "8.3+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

class X {
    const int A = 'abc';
    const int B = '123';
    const int C = 3, D = 'abc';
}

?>"
description = "This error appears when there is a mismatch between the value of a constant, and its declared type.

Note that there is not type juggling, so the value of the constant must match the type exactly. Consider that ``strict_types`` always applies in this case."
alternative[] = "Remove the constant type."
alternative[] = "Replace the constant type."
alternative[] = "Replace the constant value."
