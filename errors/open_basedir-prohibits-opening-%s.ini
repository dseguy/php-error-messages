id = "open_basedir-prohibits-opening-%s"
error = "open_basedir prohibits opening %s"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php

include '/private/folder/secret.php';

?>"
description = "``open_basedir`` is a PHP directive which limits access of the inclusion functions, such as ``include`` and ``require``, to include files which are outside the path specified with ``open_basedir``."
alternative[] = "Update the ``open_basedir`` directive to allow access to the file."
alternative[] = "Update the inclusion path to target a file that falls within the paths in the ``open_basedir`` directive."
related[] = "failed-opening-required-%s-(include_path=%s)"
related[] = "open_basedir-restriction-in-effect.-file(%s)-is-not-within-the-allowed-path(s):-(%s)"
