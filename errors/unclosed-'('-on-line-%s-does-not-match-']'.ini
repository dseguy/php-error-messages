id = "unclosed-'('-on-line-%s-does-not-match-']'"
error = "Unclosed \'(\' on line %s does not match \']\'"
phpVersion = "7.0+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

$array = [foo(1, 2];

?>"
description = "PHP keeps track of parenthesiss and square brackets. Any of them that is opened, must be closed by the corresponding one. In the current situation, an open parenthesiss is followed by a closing square bracket, which does not match."
alternative[] = "Close the parenthesis before the closing square bracket."
alternative[] = "Open a square bracket after the opening parenthesis."
