id = "get-hook-of-backed-property-%s::%s-with-set-hook-may-not-return-by-reference"
error = "Get hook of backed property %s::%s with set hook may not return by reference"
phpVersion = "8.4+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

class A {
    public $prop;
}

class B extends A {
    private $_prop;
    public $prop {
        &get => $this->_prop;
        set { $this->_prop = $value; }
    }
}

?>"
description = "When a property is a virtual property, the ``get`` hook cannot return a reference."
alternative[] = "Make the virtual property a concrete one."
alternative[] = "Remove the reference."
related[] = ""
examples[] = "Get hook of backed property B::$prop with set hook may not return by reference"
tags[] = "property hook"
seeAlso[] = ""
features[] = "property-hook"
features[] = "virtual-property"
