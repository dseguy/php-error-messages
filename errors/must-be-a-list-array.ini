id = "must-be-a-list-array"
error = "must be a list array"
phpVersion = "8.1+"
level = "E_ERROR"
exception = ""
code = "<?php

mysqli_report(MYSQLI_REPORT_ERROR | MYSQLI_REPORT_STRICT);
$link = mysqli_connect('localhost', 'my_user', 'my_password', 'world');

mysqli_query($link, 'CREATE TEMPORARY TABLE myCity LIKE City');

/* Prepare an insert statement */
$stmt = mysqli_prepare($link, 'INSERT INTO myCity (Name, CountryCode, District) VALUES (?,?,?)');

$val1 = 'Stuttgart';
$val2 = 'DEU';
$val3 = 'Baden-Wuerttemberg';

/* Execute the statement */
mysqli_stmt_execute($stmt, [$val1, $val2, 'val' => $val3]);

?>"
description = "This error is reported when the provided list of parameters, in ``mysqli_stmt_execute()`` or ``mysqli::stmt_execute()`` is not a list: the index must start at 0, and be auto-generated."
alternative[] = "Check that no index is explicitly named in the array of parameters."
alternative[] = "Apply array_values() to make the array a list."
