id = "only-basic-entities-substitution-is-supported-for-multi-byte-encodings-other-than-utf-8;-functionality-is-equivalent-to-htmlspecialchars"
error = "Only basic entities substitution is supported for multi-byte encodings other than UTF-8; functionality is equivalent to htmlspecialchars"
phpVersion = "7.0+"
level = "E_WARNING"
exception = ""
code = "<?php

    var_dump( htmlentities(\"Café & 'quotes' and € euro\", ENT_QUOTES, 'Big5') );
    // '', empty string

?>"
description = "When passing a valid encoding to htmlentities(), but that is not supported, a warning is displayed, and an empty string is returned. This contrasts with the behavior when the encoding is not recognized, where PHP defaults to UTF-8, and returns something non empty."
alternative[] = "Check that the used encoding is supported."
