id = "must-be-empty-when-class-provided-in-argument-#1-($class)-does-not-have-a-constructor"
error = "must be empty when class provided in argument #1 ($class) does not have a constructor"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php

class X
{
    public $id;
    protected $val;
    private $val2;
}

$stmt->execute(); // STMT is a PDO statement
try {
    var_dump($stmt->fetchObject(X::class, [0]));
} catch (\Throwable $e) {
    echo $e::class, ': ', $e->getMessage(), \PHP_EOL;
}

?>"
description = "The class referenced in the PDO::fetchObject method does not have a constructor. No argument will be handed to it, so there is no need to pass that argument."
alternative[] = "Omit the second argument."
alternative[] = "Use an empty array for the second argument."
alternative[] = "Use a null value for the second argument."
