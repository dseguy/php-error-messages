id = "failed-to-open-stream:-too-many-open-files"
error = "Failed to open stream: Too many open files"
phpVersion = "7.0+"
level = "E_WARNING"
exception = ""
code = "<?php

parse_ini_file('/path/to/file.ini');

?>"
description = "This error has two aspects: first, PHP tried to read a file and failed. This is the first part, where files are mentionned as streams. Streams are a more generic version of files: they may be local files, on the file system, or they may be remote, via any kind of protocol, or even, created on the fly by other processes.

The second aspect is a detailed version of the previous: the file failed to be read because the current process has reached the maximum number of possible files to read. This is a system limit, which prevents processes to open an unlimited number of files. Usually, reaching such limit means that the code is opening files carelessly. 

To check this limit, run the system command ``ulimit -n`` on Linux systems."
alternative[] = "Review the code to limit the number of opened files and sockets."
alternative[] = "Raise the limit of opened files for the process, by using ``ulimit -n 10000`` (or more, if necessary)."
