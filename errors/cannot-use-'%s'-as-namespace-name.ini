id = "cannot-use-'%s'-as-namespace-name"
error = "Cannot use \'%s\' as namespace name"
phpVersion = "7.0+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

namespace Namespace\xyz {}

namespace NAMEspace\xyz {}

// This is OK, as ``namespace`` is not first in the name
namespace Abc\Namespace\Xyz {}

?>"
description = "The ``namespace`` keyword is used to declare a namespace, and also to reference the current namespace, when building a name, for a function, a class, etc. As such, it is not possible to use ``namespace`` as a prefix of the name of a namespace (sic), as it may be confused later with the current namespace. Also, namespaces are case insensitive."
alternative[] = "Remove the word namespace in the name of the namespace."
alternative[] = "Add another prefix before the word namespace in the name of the namespace."
related[] = ""
examples[] = "Cannot use \"namespace\\xyz\" as namespace name, due to conflict with ns-relative names"
tags[] = ""
seeAlso[] = ""
features[] = "namespace"
