id = "syntax-error,-unexpected-identifier-\"readonly\",-expecting-\"function\"-or-\"const\""
error = "syntax error, unexpected identifier \"readonly\", expecting \"function\" or \"const\""
phpVersion = "8.1-"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

class X {
    readonly int $property;
}

?>"
description = "This syntax error signals that ``readonly`` is still considered as an identifier, and not as a keyword. This happens when the underlying PHP version is too old for the source code."
alternative[] = "Remove the ``readonly`` option."
alternative[] = "Upgrade to PHP 8.1 or more recent."
