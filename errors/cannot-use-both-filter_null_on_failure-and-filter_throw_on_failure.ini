id = "cannot-use-both-filter_null_on_failure-and-filter_throw_on_failure"
error = "cannot use both FILTER_NULL_ON_FAILURE and FILTER_THROW_ON_FAILURE"
phpVersion = "8.5+"
level = "E_ERROR"
exception = ""
code = "<?php

    // combining constants with |
    filter_var( value: 'bob@example.com', 
                filter: FILTER_VALIDATE_EMAIL, 
                options: FILTER_NULL_ON_FAILURE | FILTER_THROW_ON_FAILURE,
                );

    // combining constants with +
    filter_var( value: 'bob@example.com', 
                filter: FILTER_VALIDATE_EMAIL, 
                options: FILTER_NULL_ON_FAILURE + FILTER_THROW_ON_FAILURE,
                );


    // FILTER_NULL_ON_FAILURE + FILTER_THROW_ON_FAILURE = 402653184
    filter_var( value: 'bob@example.com', 
                filter: FILTER_VALIDATE_EMAIL, 
                options: 402653184,
                );

?>"
description = "There are two options for the filter extension to handle errors: either return null, or throw an exception. They are mutually exclusive, and can't be used at the same time."
alternative[] = "Use only one of the two constants."
alternative[] = "When providing the options as an integer, make sure the bytes 27 and 28 are not set at the same time."
