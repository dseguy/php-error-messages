id = "cannot-use--\"yield-from-\"-inside-a-by-reference-generator"
error = "Cannot use \\\"yield from\\\" inside a by-reference generator"
phpVersion = "7.0+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

function &foo() {
    yield from [1,2,3];
}

?>"
description = "``yield from`` only emit data by value, not by reference."
alternative[] = "Remove the reference sign from the function signature."
alternative[] = "Refactor the code to use ``yield`` instead."
