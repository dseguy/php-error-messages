id = "(expression)::class-cannot-be-used-in-constant-expressions"
error = "(expression)::class cannot be used in constant expressions"
phpVersion = "8.0+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

trait T {
    const A = parent::class;
    const B = self::A::class;
}

?>"
description = "This error appears when the value of a constant is not entirely static, but may depend on context. In this case, the ``self::A`` will only be known when the trait t is used in a class."
alternative[] = "Keep values of constants simple."
