id = "cannot-use-multiple-word-order-options"
error = "cannot use multiple word order options"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php
gmp_import('a', 1, GMP_MSW_FIRST | GMP_LSW_FIRST);
?>"
description = "The third option of ``gmp_import()`` must be either ``GMP_MSW_FIRST`` or ``GMP_LSW_FIRST``, but not at the same time."
alternative[] = "Use the ``GMP_MSW_FIRST``."
alternative[] = "Use the ``GMP_LSW_FIRST``."
alternative[] = "Use the default option, by omitting this argument (default is ``GMP_MSW_FIRST``)."
