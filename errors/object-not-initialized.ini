id = "object-not-initialized"
error = "Object not initialized"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php

class MyDirectoryIterator extends DirectoryIterator {
    public function __construct() {}
}

$it = new MyDirectoryIterator;
try {
    $it->key();
} catch (Error $e) {
    echo $e->getMessage(), "\n";
}

?>"
description = "This error is emitted with intl and spl extension. It happens when an object was not fully initialized with the extension: it was only extended and the parent constructor was omitted. This leaves the custom object valid, but not finalized from the parent point of view.

This error may also happen when the object keeps being used, after an ``unset()`` call, or ``__destructor`` call."
alternative[] = "Call ``parent::__construct`` in the custom constructor."
alternative[] = "Remove any call to the object after destruction."
related[] = ""
