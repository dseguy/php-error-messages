id = "providing-an-empty-string-is-deprecated"
error = "Providing an empty string is deprecated"
phpVersion = "8.5+"
level = "E_WARNING"
exception = ""
code = "<?php

    ord('');

?>"
description = "Calling ``ord()`` with an empty string is like calling it without an argument: it has nothing to work on."
alternative[] = "Remove the call ord() on empty string."
alternative[] = "Check that the length of the string passed to ord() is 1."
alternative[] = "Ensure that the string is in latin1 encoding: multi-byte strings will also lead to an error."
related[] = "providing-a-string-that-is-not-one-byte-long-is-deprecated.-use-ord($str[0])-instead"
examples[] = ""
tags[] = "strict check"
seeAlso[] = ""
features[] = "empty-string"
previous = ""
next = ""
extension[] = ""
analyzer[] = ""
changedBehavior[] = "emptyStringWithOrd"