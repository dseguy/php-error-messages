id = "cannot-redeclare-property-hook--\"%s"
error = "Cannot redeclare property hook \"%s"
phpVersion = "8.4+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

class Test {
    public $prop {
        GeT {}
        get {}
        
    }
}

?>"
description = "Property hook may only have one definition. It is not possible to have duplicates."
alternative[] = "Remove all but one of the definition."
alternative[] = "Rename one of them with the other property hook name: may be ``set`` had a typo and was written ``get``."
