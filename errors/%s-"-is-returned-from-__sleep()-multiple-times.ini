id = "%s-\"-is-returned-from-__sleep()-multiple-times"
error = "%s\\\" is returned from __sleep() multiple times"
phpVersion = "8.0+"
level = "E_WARNING"
exception = ""
code = "<?php

class X {
    private $data;

    public function __sleep() {
        return ['data', 'data', 'data'];
    }
}

// Create an instance and serialize it
$example = new Example('test');
$serialized = serialize($example);

?>";
description = "This error is emitted when one of the properties that has to be put to sleep is repeated in the returned array of ``__sleep()``. All the duplicated properties are reported in one pass, although each of them only once. The warning is only triggered when the code is run."
alternative[] = "Make sure the properties names are all unique in the returned array."
related[] = ""
examples[] = "data\" is returned from __sleep() multiple time"
tags[] = "lint-wont-execute"
seeAlso[] = ""
features[] = "__sleep"
features[] = "__wakeup"
features[] = "serialization"
previous = ""
next = ""
extension[] = ""
analyzer[] = ""
changedBehavior[] = ""