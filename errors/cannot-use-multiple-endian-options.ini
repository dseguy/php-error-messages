id = "cannot-use-multiple-endian-options"
error = "cannot use multiple endian options"
phpVersion = "7.0+"
level = "E_ERROR"
exception = ""
code = "<?php
gmp_import('a', 1, GMP_BIG_ENDIAN | GMP_LITTLE_ENDIAN);
?>"
description = "The third option of ``gmp_import()`` must be either ``GMP_BIG_ENDIAN``, ``GMP_NATIVE_ENDIAN`` or ``GMP_LITTLE_ENDIAN``, but not at the same time."
alternative[] = "Use the ``GMP_NATIVE_ENDIAN``."
alternative[] = "Use the ``GMP_BIG_ENDIAN``."
alternative[] = "Use the ``GMP_LITTLE_ENDIAN``."
alternative[] = "Use the default option, by omitting this argument (default is ``GMP_NATIVE_ENDIAN``)."
related[] = ""
examples[] = "gmp_import(): Argument #3 ($flags) cannot use multiple word order options"
tags[] = ""
seeAlso[] = ""
features[] = "validation"
