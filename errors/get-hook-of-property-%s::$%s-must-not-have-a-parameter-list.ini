id = "get-hook-of-property-%s::$%s-must-not-have-a-parameter-list"
error = "get hook of property %s::$%s must not have a parameter list"
phpVersion = "8.4+"
level = "E_COMPILE_ERROR"
exception = ""
code = "<?php

class X {
    private int $p {
        get($a) => 1;
    }

    private int $q {
        get() => 1;
    }
}


?>"
description = "The ``get`` hook property cannot be specified with a parameter list: not with a parameter, nor even with the empty parenthesis."
alternative[] = "Remove the parenthesis that follows the ``get`` keyword, and their content."
related[] = ""
examples[] = "get hook of property X::$p must not have a parameter list"
